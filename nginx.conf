server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # The app is fully client-side; this CSP structurally prevents the vault from
    # being sent anywhere. 'wasm-unsafe-eval' is needed for the Argon2 WASM module.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'wasm-unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; connect-src 'self'; object-src 'none'; base-uri 'self'; form-action 'none'" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer" always;

    location / {
        try_files $uri $uri/ /index.html;
    }
}
